<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}{{ config.title }}{% endblock %}</title>
<meta name="description" content="{% block description %}{{ config.description }}{% endblock %}">
<meta property="og:title" content="{% block og_title %}{{ config.title }}{% endblock %}">
<meta property="og:description" content="{% block og_description %}{{ config.description }}{% endblock %}">
<meta property="og:type" content="{% block og_type %}website{% endblock %}">
<meta property="og:url" content="{% block og_url %}{{ current_url | default(value=config.base_url) }}{% endblock %}">
<meta property="og:site_name" content="fakecloud">
<meta name="twitter:card" content="summary">
{% block canonical %}{% if current_url %}<link rel="canonical" href="{{ current_url }}">{% endif %}{% endblock %}
<link rel="help" href="/llms.txt" type="text/markdown" title="LLM documentation">
{% if config.generate_feeds %}
<link rel="alternate" type="application/rss+xml" title="fakecloud blog" href="{{ get_url(path='rss.xml') }}">
{% endif %}
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="icon" type="image/png" href="/favicon.ico">
<link rel="stylesheet" href="/style.css">
{% block structured_data %}{% endblock %}
<script>
  (function() {
    var t = localStorage.getItem('theme');
    if (t) {
      document.documentElement.setAttribute('data-theme', t);
    } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
      document.documentElement.setAttribute('data-theme', 'dark');
    } else {
      document.documentElement.setAttribute('data-theme', 'light');
    }
  })();
</script>
</head>
<body>

<nav>
  <div class="container">
    <a href="/" class="logo">fake<span>cloud</span></a>
    <div class="links">
      <a href="/#features">Features</a>
      <a href="/#sdks">SDKs</a>
      <a href="/#quickstart">Quick Start</a>
      <a href="/#compare">Compare</a>
      <a href="/docs/">Docs</a>
      <a href="/blog/">Blog</a>
      <a href="{{ config.extra.github }}">GitHub</a>
      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
        <svg class="icon-sun" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path d="M10 15a5 5 0 100-10 5 5 0 000 10zm0-13a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm0 14a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zm7-7a1 1 0 110 2h-1a1 1 0 110-2h1zM4 9a1 1 0 110 2H3a1 1 0 110-2h1zm11.07-4.07a1 1 0 010 1.41l-.7.71a1 1 0 11-1.42-1.42l.71-.7a1 1 0 011.41 0zM6.34 14.34a1 1 0 010 1.41l-.7.71a1 1 0 11-1.42-1.42l.71-.7a1 1 0 011.41 0zm8.02 1.41a1 1 0 01-1.41 0l-.71-.7a1 1 0 111.42-1.42l.7.71a1 1 0 010 1.41zM5.64 6.05a1 1 0 01-1.41 0l-.71-.7a1 1 0 011.42-1.42l.7.71a1 1 0 010 1.41z"/></svg>
        <svg class="icon-moon" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"/></svg>
      </button>
    </div>
  </div>
</nav>

{% block content %}{% endblock %}

<footer>
  <div class="container">
    <p>Built by <a href="https://faisca.dev">faisca</a></p>
    <div class="links">
      <a href="{{ config.extra.github }}">Source</a>
      <a href="{{ config.extra.github }}/issues">Issues</a>
      <a href="{{ config.extra.github }}/blob/main/LICENSE">License</a>
    </div>
  </div>
</footer>

<script>
  (function() {
    var btn = document.getElementById('theme-toggle');
    function getEffective() {
      var t = document.documentElement.getAttribute('data-theme');
      if (t) return t;
      return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    }
    btn.addEventListener('click', function() {
      var next = getEffective() === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
    });
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function() {
      // Theme will be handled by CSS automatically
    });
  })();

  // Hide future blog posts
  var today = new Date().toISOString().split('T')[0];
  document.querySelectorAll('[data-publish-date]').forEach(function(el) {
    if (el.dataset.publishDate > today) el.style.display = 'none';
  });

  // Copy buttons
  document.querySelectorAll('.blog-article pre, .code-block').forEach(function(block) {
    var btn = document.createElement('button');
    btn.className = 'copy-btn';
    btn.textContent = 'Copy';
    btn.addEventListener('click', function() {
      var text = block.querySelector('code') ? block.querySelector('code').textContent : block.textContent;
      text = text.replace(/^\$ /gm, '').replace(/^# .*\n?/gm, '').trim();
      navigator.clipboard.writeText(text).then(function() {
        btn.textContent = 'Copied!';
        setTimeout(function() { btn.textContent = 'Copy'; }, 1500);
      });
    });
    block.appendChild(btn);
  });
</script>
</body>
</html>
