name: Terraform Acceptance

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.detect.outputs.code || 'true' }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - if: github.event_name == 'pull_request'
        id: detect
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        with:
          predicate-quantifier: 'every'
          filters: |
            code:
              - '**'
              - '!**/*.md'
              - '!**/*.txt'
              - '!**/*.html'
              - '!docs/**'
              - '!website/**'
              - '!LICENSE'
              - '!.gitignore'

  tfacc-matrix:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    outputs:
      shards: ${{ steps.m.outputs.shards }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Emit shard matrix
        run: cargo run -q -p fakecloud-tfacc --bin tfacc_shards > shards.json

      - id: m
        run: echo "shards=$(cat shards.json)" >> "$GITHUB_OUTPUT"

      # Build fakecloud once here so every matrix job can download the
      # binary as an artifact instead of rebuilding from scratch.
      - name: Build fakecloud
        run: cargo build --bin fakecloud

      - name: Upload fakecloud binary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: fakecloud-binary-tfacc
          path: target/debug/fakecloud
          if-no-files-found: error
          retention-days: 1

  tfacc:
    name: tfacc ${{ matrix.name }}
    needs: [changes, tfacc-matrix]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.tfacc-matrix.outputs.shards) }}
    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: false
          swap-storage: true

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.23.x"
      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: "1.14.5"
          terraform_wrapper: false

      # Cache the upstream provider source and Go caches together — the
      # checkout dominates first-run time (~300MB shallow clone) and the Go
      # module + build caches dominate go-test compile time.
      - name: Cache Go + provider source
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
            target/tfacc
          key: tfacc-${{ runner.os }}-${{ hashFiles('crates/fakecloud-tfacc/src/lib.rs') }}
          restore-keys: |
            tfacc-${{ runner.os }}-

      - name: Download fakecloud binary
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: fakecloud-binary-tfacc
          path: target/debug

      - name: Mark fakecloud binary executable
        run: chmod +x target/debug/fakecloud

      - name: Disk diagnostics before tests
        run: df -h

      - name: Run ${{ matrix.name }} acceptance tests
        run: cargo test -p fakecloud-tfacc --test acc ${{ matrix.test_fn }} -- --nocapture

      - name: Disk diagnostics after tests
        if: always()
        run: df -h

      - name: Upload failing go test output
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: tfacc-${{ matrix.name }}-failure-log
          path: target/tfacc/logs/${{ matrix.service }}-failure.log
          if-no-files-found: ignore
          retention-days: 7
