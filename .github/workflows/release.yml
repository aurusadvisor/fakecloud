name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo fmt --check
      - run: cargo clippy --workspace -- -D warnings
      - run: cargo test --workspace --exclude fakecloud-e2e --exclude fakecloud-conformance --exclude fakecloud-tfacc --exclude fakecloud-parity

  build:
    name: Build ${{ matrix.name }}
    needs: check
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - name: linux-arm64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - name: darwin-amd64
            runner: macos-14
            target: x86_64-apple-darwin
          - name: darwin-arm64
            runner: macos-14
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }} --bin fakecloud

      - name: Package
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          DIR="fakecloud-${TAG}-${{ matrix.name }}"
          mkdir -p "${DIR}"
          cp "target/${{ matrix.target }}/release/fakecloud" "${DIR}/"
          cp LICENSE "${DIR}/"
          tar czf "${DIR}.tar.gz" "${DIR}"
          shasum -a 256 "${DIR}.tar.gz" > "${DIR}.tar.gz.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ matrix.name }}
          path: fakecloud-*.tar.gz*

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          generate_release_notes: true
          files: artifacts/*
          make_latest: true

  publish-crates:
    name: Publish Crates
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Verify tag matches Cargo.toml version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          VERSION=$(grep -m1 '^version' Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
          if [ "$TAG" != "$VERSION" ]; then
            echo "::error::Tag v${TAG} does not match Cargo.toml version ${VERSION}"
            exit 1
          fi
          echo "Tag v${TAG} matches Cargo.toml version ${VERSION}"

      - name: Publish all crates
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"

          wait_for_crate() {
            # Check the sparse index (what cargo actually uses to resolve deps)
            local name="$1"
            local prefix
            case ${#name} in
              1) prefix="1" ;;
              2) prefix="2" ;;
              3) prefix="3/${name:0:1}" ;;
              *) prefix="${name:0:2}/${name:2:2}" ;;
            esac
            local url="https://index.crates.io/${prefix}/${name}"
            echo "Waiting for $name@$TAG in sparse index..."
            for i in $(seq 1 60); do
              if curl -sf "$url" 2>/dev/null | grep -q "\"vers\":\"$TAG\""; then
                echo "$name@$TAG indexed after $((i * 5))s"
                return 0
              fi
              sleep 5
            done
            echo "WARNING: timed out waiting for $name@$TAG, continuing anyway"
          }

          publish() {
            echo "Publishing $1..."
            OUTPUT=$(cargo publish -p "$1" 2>&1) && {
              echo "Successfully published $1"
            } || {
              if echo "$OUTPUT" | grep -qE "already uploaded|already exists"; then
                echo "Skipping $1: already published"
                return 0
              else
                echo "ERROR publishing $1:"
                echo "$OUTPUT"
                exit 1
              fi
            }
            wait_for_crate "$1"
          }

          # Layer 1: no internal deps
          publish fakecloud-aws
          publish fakecloud-sdk
          publish fakecloud-persistence

          # Layer 2: depends on fakecloud-aws
          publish fakecloud-core

          # Layer 3a: depend on aws + core + persistence only
          publish fakecloud-sqs
          publish fakecloud-iam
          publish fakecloud-organizations
          publish fakecloud-lambda
          publish fakecloud-logs
          publish fakecloud-kms
          publish fakecloud-ses
          publish fakecloud-rds
          publish fakecloud-elasticache
          publish fakecloud-kinesis
          publish fakecloud-scheduler
          publish fakecloud-bedrock
          publish fakecloud-cloudfront
          publish fakecloud-acm
          publish fakecloud-application-autoscaling
          publish fakecloud-wafv2
          publish fakecloud-cloudwatch
          publish fakecloud-glue
          publish fakecloud-bedrock-agent

          # Layer 3b: depend on layer 3a
          publish fakecloud-sns            # depends on ses
          publish fakecloud-secretsmanager # depends on iam
          publish fakecloud-cognito        # depends on iam
          publish fakecloud-elbv2          # depends on wafv2
          publish fakecloud-apigatewayv2   # depends on wafv2
          publish fakecloud-bedrock-agent-runtime  # depends on bedrock-agent
          publish fakecloud-eventbridge    # depends on iam, lambda, logs

          # Layer 4: depend on layer 3a/3b crates
          publish fakecloud-s3             # depends on kms
          publish fakecloud-ecr            # depends on iam, kms
          publish fakecloud-ssm            # depends on secretsmanager
          publish fakecloud-apigateway     # depends on elbv2, wafv2

          # Layer 5: depend on layer 4
          publish fakecloud-dynamodb       # depends on s3
          publish fakecloud-firehose       # depends on s3
          publish fakecloud-athena         # depends on glue, s3
          publish fakecloud-route53        # depends on cloudfront, elbv2, logs, s3
          publish fakecloud-ecs            # depends on logs, secretsmanager, ssm

          # Layer 6: depends on layer 5
          publish fakecloud-stepfunctions  # depends on dynamodb

          # Layer 7: depends on all services
          publish fakecloud-cloudformation

          # Layer 8: the binary
          publish fakecloud
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  publish-npm:
    name: Publish npm
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          registry-url: https://registry.npmjs.org

      - name: Verify tag matches package.json version
        working-directory: sdks/typescript
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$VERSION" ]; then
            echo "::error::Tag v${TAG} does not match package.json version ${VERSION}"
            exit 1
          fi
          echo "Tag v${TAG} matches package.json version ${VERSION}"

      - name: Build
        working-directory: sdks/typescript
        run: |
          npm ci
          npm run build

      - name: Publish
        working-directory: sdks/typescript
        run: npm publish --access public || { echo "Package may already be published"; npm view fakecloud@"$(node -p "require('./package.json').version")" version && echo "Already published, skipping" || exit 1; }
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-pypi:
    name: Publish PyPI
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Verify tag matches pyproject.toml version
        working-directory: sdks/python
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$TAG" != "$VERSION" ]; then
            echo "::error::Tag v${TAG} does not match pyproject.toml version ${VERSION}"
            exit 1
          fi
          echo "Tag v${TAG} matches pyproject.toml version ${VERSION}"

      - name: Build
        working-directory: sdks/python
        run: |
          pip install build twine
          python -m build

      - name: Publish
        working-directory: sdks/python
        run: twine upload dist/* || { echo "Package may already be published"; pip install fakecloud=="${GITHUB_REF#refs/tags/v}" --dry-run 2>/dev/null && echo "Already published, skipping" || exit 1; }
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}

  publish-maven:
    name: Publish Maven Central
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-java@8df1039502a15bceb9433410b1a100fbe190c53b # v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Verify tag matches build.gradle.kts version
        working-directory: sdks/java
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          VERSION=$(grep -E '^version = ' build.gradle.kts | head -1 | sed -E 's/.*"(.*)".*/\1/')
          if [ "$TAG" != "$VERSION" ]; then
            echo "::error::Tag v${TAG} does not match build.gradle.kts version ${VERSION}"
            exit 1
          fi
          echo "Tag v${TAG} matches build.gradle.kts version ${VERSION}"

      - name: Publish to Maven Central
        working-directory: sdks/java
        run: ./gradlew publishToMavenCentral --no-daemon --no-configuration-cache
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.MAVEN_SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.MAVEN_SIGNING_PASSWORD }}

  publish-packagist:
    name: Publish Packagist
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          # Don't persist the default GITHUB_TOKEN as a git credential helper,
          # otherwise `git push` to the mirror repo ignores our PAT and uses
          # the default token (which can't push to faiscadev/fakecloud-php).
          persist-credentials: false

      - name: Verify tag matches composer.json version
        working-directory: sdks/php
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          VERSION=$(php -r "echo json_decode(file_get_contents('composer.json'))->version ?? 'none';")
          # composer.json version field is optional — skip check if absent
          if [ "$VERSION" != "none" ] && [ "$TAG" != "$VERSION" ]; then
            echo "::error::Tag v${TAG} does not match composer.json version ${VERSION}"
            exit 1
          fi

      - name: Split and push to mirror repo
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Split sdks/php/ into its own branch with rewritten history
          SHA=$(git subtree split --prefix=sdks/php)

          # Push to mirror repo
          git remote add php-mirror https://x-access-token:${MIRROR_TOKEN}@github.com/faiscadev/fakecloud-php.git
          git push php-mirror "${SHA}:refs/heads/main" --force

          # Create version tag on mirror (-f because v${TAG} exists in this checkout)
          git tag -f "v${TAG}" "${SHA}"
          git push php-mirror "v${TAG}" --force
        env:
          MIRROR_TOKEN: ${{ secrets.PHP_MIRROR_TOKEN }}

  publish-go:
    name: Publish Go module
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Create Go module tag
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          GO_TAG="sdks/go/v${TAG}"
          # Check if tag already exists
          if gh api "repos/${{ github.repository }}/git/refs/tags/${GO_TAG}" >/dev/null 2>&1; then
            echo "Tag ${GO_TAG} already exists, skipping"
            exit 0
          fi
          # Create tag via API (avoids git push workflow permission issues)
          gh api "repos/${{ github.repository }}/git/refs" \
            -f ref="refs/tags/${GO_TAG}" \
            -f sha="${GITHUB_SHA}"
          echo "Created tag ${GO_TAG}"
        env:
          GH_TOKEN: ${{ github.token }}
