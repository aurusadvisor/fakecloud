name: Conformance

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 0' # weekly Sunday 6am UTC
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.detect.outputs.code || 'true' }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - if: github.event_name == 'pull_request'
        id: detect
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        with:
          predicate-quantifier: 'every'
          filters: |
            code:
              - '**'
              - '!**/*.md'
              - '!**/*.txt'
              - '!**/*.html'
              - '!docs/**'
              - '!website/**'
              - '!LICENSE'
              - '!.gitignore'

  conformance:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: false
          swap-storage: true

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: taiki-e/install-action@b3bd89dcd46d5f3d508436e1bf794284c155bbcc # nextest
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Disk diagnostics before build
        run: df -h

      - name: Build server
        run: cargo build --bin fakecloud

      - name: Run conformance integration tests
        run: cargo nextest run -P ci -p fakecloud-conformance --tests

      - name: Disk diagnostics after tests
        if: always()
        run: df -h

      - name: Build conformance tool
        run: cargo build -p fakecloud-conformance

      - name: Check conformance (fails if coverage drops)
        id: check
        run: |
          set -o pipefail
          cargo run -p fakecloud-conformance -- check 2>&1 | tee conformance-report.txt

      - name: Audit handwritten tests (fails if implemented action lacks a test)
        if: always() && steps.check.outcome != 'skipped'
        run: cargo run -p fakecloud-conformance -- audit

      - name: Generate JSON report
        if: always()
        run: cargo run -p fakecloud-conformance -- run --format json > conformance-report.json 2>/dev/null || true

      - name: Post summary
        if: always()
        run: |
          echo '## Conformance Report' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          if [ -f conformance-report.txt ]; then
            echo '```' >> $GITHUB_STEP_SUMMARY
            grep -E "^(Conformance|  |Operations|Variants)" conformance-report.txt >> $GITHUB_STEP_SUMMARY || true
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: conformance-report
          path: |
            conformance-report.txt
            conformance-report.json
          retention-days: 90
