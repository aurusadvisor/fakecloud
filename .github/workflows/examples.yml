name: Examples

on:
  push:
    branches: [main]


env:
  CARGO_TERM_COLOR: always

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.detect.outputs.code || 'true' }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - if: github.event_name == 'pull_request'
        id: detect
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        with:
          predicate-quantifier: 'every'
          filters: |
            code:
              - '**'
              - '!**/*.md'
              - '!**/*.txt'
              - '!**/*.html'
              - '!docs/**'
              - '!website/**'
              - '!LICENSE'
              - '!.gitignore'

  examples:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Build server
        run: cargo build --bin fakecloud

      - name: Start FakeCloud
        run: |
          cargo run --bin fakecloud &
          for i in $(seq 1 30); do
            curl -sf http://localhost:4566/_fakecloud/health && exit 0
            sleep 1
          done
          echo "FakeCloud failed to start"
          exit 1

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"

      - name: Run Python demo
        run: |
          pip install boto3
          python examples/python/demo.py

      - name: Run Node demo
        run: |
          npm install @aws-sdk/client-sqs @aws-sdk/client-sns @aws-sdk/client-ssm @aws-sdk/client-s3 @aws-sdk/client-dynamodb @aws-sdk/client-lambda @aws-sdk/client-secrets-manager @aws-sdk/client-cloudwatch-logs @aws-sdk/client-kms
          node examples/node/demo.js

      - name: Run sample app
        run: python examples/sample-app/app.py

      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3

      - name: Run Terraform example
        working-directory: examples/terraform
        run: |
          rm -rf .terraform .terraform.lock.hcl terraform.tfstate*
          terraform init
          terraform apply -auto-approve
          terraform destroy -auto-approve
