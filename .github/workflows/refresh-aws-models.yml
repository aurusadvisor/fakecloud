name: Refresh AWS Smithy models

on:
  schedule:
    - cron: '0 7 * * 1' # weekly Monday 07:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Run update-aws-models.sh
        run: bash scripts/update-aws-models.sh

      - name: Detect changes
        id: changed
        run: |
          if git diff --quiet --exit-code aws-models/; then
            echo "any=false" >> "$GITHUB_OUTPUT"
          else
            echo "any=true" >> "$GITHUB_OUTPUT"
            git diff --stat aws-models/ | tail -1
          fi

      - name: Open / update refresh PR
        if: steps.changed.outputs.any == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          branch="chore/refresh-aws-models"
          git config user.name "fakecloud-bot"
          git config user.email "fakecloud-bot@users.noreply.github.com"
          git checkout -B "$branch"
          git add aws-models/
          git commit -m "chore(aws-models): weekly refresh from aws/api-models-aws"
          git push -f origin "$branch"
          if gh pr view "$branch" --json state -q .state 2>/dev/null | grep -q OPEN; then
            echo "PR already open; pushed update."
          else
            gh pr create \
              --base main \
              --head "$branch" \
              --title "chore(aws-models): weekly refresh from aws/api-models-aws" \
              --body "Automated weekly refresh of \`aws-models/\` from [aws/api-models-aws](https://github.com/aws/api-models-aws). Generated by \`.github/workflows/refresh-aws-models.yml\`. Review the diff before merging — Smithy upstream changes may surface new conformance failures (new ops, renamed errors, etc.)."
          fi
