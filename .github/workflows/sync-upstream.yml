name: Sync Upstream

on:
  schedule:
    - cron: '0 6 1,15 * *'  # 1st and 15th of each month at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/faiscadev/fakecloud.git
          git fetch upstream main

      - name: Reset main to upstream
        run: |
          git checkout main
          git reset --hard upstream/main
          git push origin main --force

      - name: Rebase patched onto new main
        run: |
          git checkout patched 2>/dev/null || git checkout -b patched
          git rebase main || {
            echo "Rebase conflict detected. Aborting rebase and creating PR."
            git rebase --abort
            git checkout -b fix/upstream-merge-$(date +%Y%m%d)
            git push origin HEAD
            gh pr create \
              --title "fix: resolve upstream merge conflict" \
              --body "Auto-generated: upstream sync detected a conflict on the patched branch. Resolve manually." \
              --base patched
            exit 1
          }
          git push origin patched --force
