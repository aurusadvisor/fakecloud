coverage:
  status:
    project:
      default:
        target: auto
        threshold: 0%
    patch:
      default:
        # Many net-new ops are protocol shims exercised via
        # crates/fakecloud-conformance/tests/* (excluded from coverage)
        # rather than unit tests, so the patch gate is informational
        # rather than blocking. The project gate still enforces overall
        # health.
        target: 0%

comment:
  layout: "reach, diff, flags, files"
  behavior: default
  require_changes: false

ignore:
  - "crates/fakecloud-e2e/**"
  - "crates/fakecloud-conformance/tests/**"
  - "crates/fakecloud-tfacc/**"
  - "crates/fakecloud-parity/**"
  - "crates/fakecloud-testkit/**"
  - "crates/fakecloud-conformance-macros/**"
  - "**/tests/**"
  - "**/build.rs"
